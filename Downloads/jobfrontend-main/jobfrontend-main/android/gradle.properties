org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true

# Kotlin incremental compile breaks on Windows when the app is on a different drive than Pub
# (e.g. F:\project vs C:\Users\...\Pub\Cache) — "this and base files have different roots".
kotlin.incremental=false
kotlin.incremental.android=false
kotlin.incremental.useClasspathSnapshot=false

# If it still fails: put Pub cache on the same drive as the project, then flutter pub get:
#   PowerShell: $env:PUB_CACHE="F:\pub-cache"; flutter pub get
# Or delete plugin build dirs: ...\Pub\Cache\hosted\pub.dev\shared_preferences_android-*\android\build
